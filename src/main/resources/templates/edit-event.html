<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Event - Event Management System</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">EventApp</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/events/create}">Create Event</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/events}">My Events</a>
                </li>
            </ul>
            <span class="navbar-text me-3 text-dark fw-medium" th:if="${currentUser != null}" th:text="'Hello, ' + ${currentUser.fullName}"></span>
            <form th:action="@{/logout}" method="post" id="logoutForm" class="d-none"></form>
            <button class="btn btn-outline-primary" onclick="document.getElementById('logoutForm').submit();">Logout</button>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container my-5 animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card p-4">
                <div class="mb-4">
                    <h2 class="fw-bold" style="color: #2b3a4a;">Edit Event</h2>
                    <p class="text-muted">Modify the details of your event below.</p>
                </div>

                <form th:action="@{/events/edit/{id}(id=${event.id})}" th:object="${event}" method="post">
                    <!-- Title -->
                    <div class="mb-3">
                        <label for="title" class="form-label">Event Title</label>
                        <input type="text" id="title" th:field="*{title}" class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''" placeholder="e.g. Annual Tech Symposium" required autofocus>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title Error</div>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea id="description" th:field="*{description}" class="form-control" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''" rows="4" placeholder="Briefly describe what this event is about..." required></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description Error</div>
                    </div>

                    <!-- Venue -->
                    <div class="mb-3">
                        <label for="venue" class="form-label">Venue</label>
                        <input type="text" id="venue" th:field="*{venue}" class="form-control" th:classappend="${#fields.hasErrors('venue')} ? 'is-invalid' : ''" placeholder="e.g. Conference Room B" required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('venue')}" th:errors="*{venue}">Venue Error</div>
                    </div>

                    <!-- Date -->
                    <div class="mb-4">
                        <label for="eventDate" class="form-label">Event Date</label>
                        <input type="date" id="eventDate" th:field="*{eventDate}" class="form-control" th:classappend="${#fields.hasErrors('eventDate')} ? 'is-invalid' : ''" required>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}">Date Error</div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4 py-2">Save Changes</button>
                        <a th:href="@{/events}" class="btn btn-outline-secondary px-4 py-2 border-0">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    <div class="container">
        <p class="mb-0">&copy; 2026 EventApp. All rights reserved.</p>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script th:src="@{/js/script.js}"></script>
</body>
</html>
