<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event - Event Management System</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom Style -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/dashboard}">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-calendar2-week-fill" viewBox="0 0 16 16">
                <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zm9.96 5a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1zm-9 3a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1zm3 0a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1zm3 0a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1zm3 0a.5.5 0 0 0-.5.5v1a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5v-1a.5.5 0 0 0-.5-.5h-1z"/>
            </svg>
            <span>EventApp</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/events/create}">Create Event</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/events}">My Events</a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <span class="navbar-text text-dark fw-medium" th:if="${currentUser != null}" th:text="'Hello, ' + ${currentUser.fullName}"></span>
                <form th:action="@{/logout}" method="post" id="logoutForm" class="d-none"></form>
                <button class="btn btn-outline-primary" onclick="document.getElementById('logoutForm').submit();">Logout</button>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container my-5 animate-fade-in">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm p-4">
                <div class="mb-4">
                    <div class="d-flex align-items-center gap-2 mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="#4a90e2" class="bi bi-calendar-plus" viewBox="0 0 16 16">
                            <path d="M8 7a.5.5 0 0 1 .5.5v2h2a.5.5 0 0 1 0 1h-2v2a.5.5 0 0 1-1 0v-2h-2a.5.5 0 0 1 0-1h2v-2A.5.5 0 0 1 8 7"/>
                            <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5M1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4z"/>
                        </svg>
                        <h2 class="fw-bold text-dark mb-0" style="color: #1e3d59 !important;">Create Event</h2>
                    </div>
                    <p class="text-muted">Fill out the details below to host a new event.</p>
                </div>

                <form th:action="@{/events/create}" th:object="${event}" method="post">
                    <!-- Title -->
                    <div class="mb-3">
                        <label for="title" class="form-label">Event Title</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border: 1.5px solid rgba(135, 206, 235, 0.4); border-radius: 12px 0 0 12px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#a0aec0" class="bi bi-type" viewBox="0 0 16 16">
                                    <path d="M2.244 13.081a.5.5 0 0 0 .5.5H3.6a.5.5 0 0 0 .5-.5V11.5c0-.6.4-1 1-1h6.8c.6 0 1 .4 1 1v1.5a.5.5 0 0 0 .5.5h.856a.5.5 0 0 0 .5-.5V1.5a.5.5 0 0 0-.5-.5H13.4a.5.5 0 0 0-.5.5v1.5c0 .6-.4 1-1 1H5.1c-.6 0-1-.4-1-1V1.5a.5.5 0 0 0-.5-.5h-.856a.5.5 0 0 0-.5.5z"/>
                                </svg>
                            </span>
                            <input type="text" id="title" th:field="*{title}" class="form-control border-start-0" style="border-radius: 0 12px 12px 0;" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''" placeholder="e.g. Executive Board Meeting" required autofocus>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title Error</div>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea id="description" th:field="*{description}" class="form-control" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''" rows="4" placeholder="Describe the agenda, speakers, or topics covered..." required></textarea>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">Description Error</div>
                    </div>

                    <!-- Venue -->
                    <div class="mb-3">
                        <label for="venue" class="form-label">Venue / Location</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border: 1.5px solid rgba(135, 206, 235, 0.4); border-radius: 12px 0 0 12px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#a0aec0" class="bi bi-geo-alt" viewBox="0 0 16 16">
                                    <path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10m0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6"/>
                                </svg>
                            </span>
                            <input type="text" id="venue" th:field="*{venue}" class="form-control border-start-0" style="border-radius: 0 12px 12px 0;" th:classappend="${#fields.hasErrors('venue')} ? 'is-invalid' : ''" placeholder="e.g. Conference Hall A or Microsoft Teams link" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('venue')}" th:errors="*{venue}">Venue Error</div>
                        </div>
                    </div>

                    <!-- Organizer Details -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="organizerName" class="form-label">Organizer Name</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0" style="border: 1.5px solid rgba(135, 206, 235, 0.4); border-radius: 12px 0 0 12px;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#a0aec0" class="bi bi-person-fill" viewBox="0 0 16 16">
                                        <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                                    </svg>
                                </span>
                                <input type="text" id="organizerName" th:field="*{organizerName}" class="form-control border-start-0" style="border-radius: 0 12px 12px 0;" th:classappend="${#fields.hasErrors('organizerName')} ? 'is-invalid' : ''" placeholder="e.g. Alice Smith" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('organizerName')}" th:errors="*{organizerName}">Organizer Name Error</div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="organizerEmail" class="form-label">Organizer Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0" style="border: 1.5px solid rgba(135, 206, 235, 0.4); border-radius: 12px 0 0 12px;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#a0aec0" class="bi bi-envelope-fill" viewBox="0 0 16 16">
                                        <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414zM0 4.697v7.104l5.803-3.558zM6.761 8.83l-6.57 4.027A2 2 0 0 0 2 14h12a2 2 0 0 0 1.808-1.144l-6.57-4.027L8 9.586zM16 4.697v7.104l-5.803-3.558z"/>
                                    </svg>
                                </span>
                                <input type="email" id="organizerEmail" th:field="*{organizerEmail}" class="form-control border-start-0" style="border-radius: 0 12px 12px 0;" th:classappend="${#fields.hasErrors('organizerEmail')} ? 'is-invalid' : ''" placeholder="organizer@domain.com" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('organizerEmail')}" th:errors="*{organizerEmail}">Email Error</div>
                            </div>
                        </div>
                    </div>

                    <!-- Date & Time -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="eventDate" class="form-label">Date of Event</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0" style="border: 1.5px solid rgba(135, 206, 235, 0.4); border-radius: 12px 0 0 12px;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#a0aec0" class="bi bi-calendar" viewBox="0 0 16 16">
                                        <path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5M1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4z"/>
                                    </svg>
                                </span>
                                <input type="date" id="eventDate" th:field="*{eventDate}" class="form-control border-start-0" style="border-radius: 0 12px 12px 0;" th:classappend="${#fields.hasErrors('eventDate')} ? 'is-invalid' : ''" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('eventDate')}" th:errors="*{eventDate}">Date Error</div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="eventTime" class="form-label">Venue Time</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0" style="border: 1.5px solid rgba(135, 206, 235, 0.4); border-radius: 12px 0 0 12px;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#a0aec0" class="bi bi-clock-fill" viewBox="0 0 16 16">
                                        <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71z"/>
                                    </svg>
                                </span>
                                <input type="time" id="eventTime" th:field="*{eventTime}" class="form-control border-start-0" style="border-radius: 0 12px 12px 0;" th:classappend="${#fields.hasErrors('eventTime')} ? 'is-invalid' : ''" required>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('eventTime')}" th:errors="*{eventTime}">Time Error</div>
                            </div>
                        </div>
                    </div>

                    <!-- Duration -->
                    <div class="mb-4">
                        <label for="duration" class="form-label">Duration (in minutes)</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="border: 1.5px solid rgba(135, 206, 235, 0.4); border-radius: 12px 0 0 12px;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#a0aec0" class="bi bi-hourglass-split" viewBox="0 0 16 16">
                                    <path d="M2.5 15a.5.5 0 1 1 0-1h1v-1a4.5 4.5 0 0 1 2.557-4.06c.29-.139.443-.377.443-.59v-.7c0-.213-.154-.451-.443-.59A4.5 4.5 0 0 1 3.5 3V2h-1a.5.5 0 0 1 0-1h11a.5.5 0 0 1 0 1h-1v1a4.5 4.5 0 0 1-2.557 4.06c-.29.139-.443.377-.443.59v.7c0 .213.154.451.443.59A4.5 4.5 0 0 1 12.5 13v1h1a.5.5 0 0 1 0 1zm2-13v1c0 .537.12 1.045.337 1.5h6.326c.216-.455.337-.963.337-1.5zm3 6.35c-.17-.11-.272-.24-.272-.35v-.7c0-.11.103-.24.272-.35a3.5 3.5 0 0 0 1.228-2.65H6.228a3.5 3.5 0 0 0 1.228 2.65c.17.11.272.24.272.35v.7c0 .11-.103.24-.272.35a3.5 3.5 0 0 0-1.228 2.65h3.544a3.5 3.5 0 0 0-1.228-2.65"/>
                                </svg>
                            </span>
                            <input type="number" id="duration" th:field="*{duration}" class="form-control border-start-0" style="border-radius: 0 12px 12px 0;" th:classappend="${#fields.hasErrors('duration')} ? 'is-invalid' : ''" placeholder="e.g. 60" min="1" required>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}">Duration Error</div>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4 py-2">Create Event</button>
                        <a th:href="@{/events}" class="btn btn-outline-secondary px-4 py-2 border-0">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer>
    <div class="container">
        <p class="mb-0">&copy; 2026 EventApp. All rights reserved.</p>
    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script th:src="@{/js/script.js}"></script>
</body>
</html>
