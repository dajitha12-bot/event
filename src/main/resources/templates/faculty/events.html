<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Events — EMS</title>
<link rel="stylesheet" href="/css/main.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside th:replace="~{fragments/sidebar :: facultySidebar('events')}"></aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="topbar">
      <div>
        <div class="page-title">My <span>Events</span></div>
        <div class="text-muted" style="font-size:.82rem; margin-top:2px;">View event submission status, bookings, and student registration lists</div>
      </div>
      <div class="topbar-actions">
        <a href="/faculty/events/create" class="btn btn-primary">➕ Create New Event</a>
      </div>
    </div>

    <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>
    <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>

    <div th:if="${myEvents.empty}" class="empty-state" style="padding:80px 20px;">
      <div class="e-icon">📭</div>
      <p>No events created yet.</p>
      <a href="/faculty/events/create" class="btn btn-primary" style="margin-top:16px;">Create First Event</a>
    </div>

    <div class="events-grid" th:unless="${myEvents.empty}">
      <div th:each="event : ${myEvents}" class="event-card">
        <div class="event-card-header">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px;">
            <span th:switch="${event.status}">
              <span th:case="'APPROVED'" class="badge badge-approved">✓ Approved</span>
              <span th:case="'PENDING'" class="badge badge-pending">⏳ Pending</span>
              <span th:case="'REJECTED'" class="badge badge-rejected">✗ Rejected</span>
            </span>
            <span th:if="${event.registrationFee == 0}" class="badge badge-free">FREE</span>
          </div>
          <h3 th:text="${event.name}">Event Name</h3>
        </div>
        <div class="event-card-body" style="margin-top:16px;">
          <div class="event-meta">
            <div class="event-meta-item"><span class="mi">📍</span><span th:text="${event.venue}">Venue</span></div>
            <div class="event-meta-item"><span class="mi">🕐</span><span th:text="${event.time}">Time</span></div>
            <div class="event-meta-item"><span class="mi">💺</span>
              <span th:text="${event.bookedSeats} + ' registered / ' + ${event.totalSeats} + ' total'">0/100</span>
            </div>
            <div class="event-meta-item"><span class="mi">💰</span>
              <span th:if="${event.registrationFee == 0}" class="text-green" style="color: var(--success); font-weight:600;">FREE ENTRY</span>
              <span th:unless="${event.registrationFee == 0}">
                ₹<span th:text="${#numbers.formatDecimal(event.registrationFee,1,0)}">0</span> per ticket
              </span>
            </div>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:18px; padding-top:14px; border-top: 1px solid var(--border-color);">
            <div>
              <div class="form-label" style="font-size:.65rem; margin-bottom:2px;">Revenue</div>
              <div class="fw-bold" style="color: var(--success); font-size:1.05rem;">₹<span th:text="${#numbers.formatDecimal(event.totalRevenue,1,0)}">0</span></div>
            </div>
            <a th:href="@{/faculty/events/{id}/students(id=${event.id})}" class="btn btn-outline btn-sm">👥 View Students</a>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
