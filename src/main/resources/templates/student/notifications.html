<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notifications — EMS</title>
<link rel="stylesheet" href="/css/main.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside th:replace="~{fragments/sidebar :: studentSidebar('notifications')}"></aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="topbar">
      <div>
        <div class="page-title">My <span>Notifications</span></div>
        <div class="text-muted" style="font-size:.82rem; margin-top:2px;">Recent system notifications and registration alerts</div>
      </div>
      <div class="topbar-user">
        <div class="avatar" th:text="${#strings.substring(studentName,0,1)}">S</div>
        <span th:text="${studentName}">Student</span>
      </div>
    </div>

    <div th:if="${notifications.empty}" class="empty-state" style="padding:80px 20px;">
      <div class="e-icon">🔔</div>
      <p>You have no notifications at this time.</p>
    </div>

    <div class="card" th:unless="${notifications.empty}">
      <div class="card-header"><span class="card-title">🔔 Recent Activity Alerts</span></div>
      <div class="card-body">
        <div class="timeline">
          <div th:each="notif : ${notifications}" class="timeline-item">
            <div class="timeline-badge">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
            </div>
            <div class="timeline-content">
              <div class="fw-bold" style="color: var(--text-primary); font-size: 0.92rem;" th:text="${notif.message}">Notification message</div>
              <div class="timeline-time" th:text="${#temporals.format(notif.createdAt, 'dd MMM yyyy, HH:mm')}">Date & Time</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
</body>
</html>
