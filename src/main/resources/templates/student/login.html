<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Student Login — EMS</title>
<link rel="stylesheet" href="/css/main.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div class="p-icon" style="font-size: 2.5rem; text-align: center; margin-bottom: 12px;">🎓</div>
      <h1>Student Sign In</h1>
      <p>Sign in to register for upcoming events</p>
    </div>

    <div th:if="${error}" class="alert alert-error">⚠️ <span th:text="${error}"></span></div>
    <div th:if="${success}" class="alert alert-success">✓ <span th:text="${success}"></span></div>

    <form method="post" action="/student/login">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="username@student.edu" required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
        Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have a student account? <a href="/student/register">Sign Up</a>
    </div>
    <div class="auth-footer" style="margin-top:12px;">
      <a href="/" style="color:var(--text-secondary);">← Back to Portal Catalog</a>
    </div>
  </div>
</div>
</body>
</html>
